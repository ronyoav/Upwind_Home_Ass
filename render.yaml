services:
  - type: web
    name: email-security-scorer
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    scaling:
      minInstances: 1
      maxInstances: 1
    envVars:
      - key: API_KEY_CLAUDE
        sync: false
      - key: REDIS_URL
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
